<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Blog{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #0d1117; color: #e6edf3; }
    .site-nav { background-color: #161b22 !important; border-bottom: 1px solid #30363d; }
    .site-nav .navbar-brand { color: #e6edf3; font-weight: 700; font-size: 1.25rem; }
    .site-nav .navbar-brand:hover { color: #58a6ff; }
    .post-card { background-color: #161b22; border: 1px solid #30363d; border-radius: 8px; transition: border-color 0.15s; }
    .post-card:hover { border-color: #58a6ff; }
    .post-title-link { color: #58a6ff; text-decoration: none; }
    .post-title-link:hover { text-decoration: underline; }
    .tag-badge { background-color: #21262d; color: #79c0ff; border: 1px solid #30363d; font-size: 0.72rem; font-weight: 500; }
    .post-meta { color: #8b949e; font-size: 0.875rem; }
    .back-link { color: #58a6ff; text-decoration: none; font-size: 0.875rem; }
    .back-link:hover { text-decoration: underline; }
    .post-content { line-height: 1.8; }
    .post-content h1, .post-content h2, .post-content h3 { color: #e6edf3; margin-top: 2rem; }
    .post-content a { color: #58a6ff; }
    .post-content blockquote { border-left: 4px solid #30363d; padding-left: 1rem; color: #8b949e; }
    .post-content img { max-width: 100%; border-radius: 6px; }
    .post-content table { border-color: #30363d; }
    .post-content th, .post-content td { border-color: #30363d !important; }
    .post-content pre { background: transparent; padding: 0; }
    .highlight { border-radius: 6px; overflow-x: auto; margin: 1.25rem 0; }
    .highlight pre { margin: 0; padding: 1rem 1.25rem; font-size: 0.875rem; }
    footer { border-top: 1px solid #30363d; color: #8b949e; }
    {{ pygments_css }}
  </style>
</head>
<body>
  <nav class="navbar site-nav mb-5">
    <div class="container" style="max-width: 860px;">
      <a class="navbar-brand" href="{{ site_root }}">&#x2726; My Blog</a>
    </div>
  </nav>
  <main class="container pb-5" style="max-width: 860px;">
    {% block content %}{% endblock %}
  </main>
  <footer class="py-4 mt-5 text-center">
    <div class="container" style="max-width: 860px;">
      <small>Built with blog-inceptor</small>
    </div>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
